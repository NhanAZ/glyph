<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Glyph Tools 🇻🇳</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
	<link rel="shortcut icon" href="favicon.ico">
	<link rel="manifest" href="site.webmanifest">
	<meta name="theme-color" content="#f5f5f7">
	<link href="styles.css" rel="stylesheet">
</head>

<body>
	<div class="app-container py-4 px-3 px-md-5">
		
		<!-- Header -->
	<header class="d-flex justify-content-between align-items-center mb-5 mt-2 header-bar">
		<div>
			<h1 class="fw-bold mb-0 title-text">Glyph Tools 🇻🇳</h1>
			<p class="text-secondary subtitle-text mb-0 mt-1">Smart, intelligent character tools</p>
		</div>
		<div class="d-flex align-items-center gap-2 header-actions">
			<button class="icon-button glass-btn d-md-none nav-toggle-btn" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav" aria-controls="mobileNav" aria-expanded="false" aria-label="Toggle navigation">
				<i class="fas fa-bars"></i>
			</button>
			<button id="darkModeToggle" class="icon-button glass-btn" title="Toggle Dark Mode">
				<i class="fas fa-moon"></i>
			</button>
		</div>
	</header>

	<div class="collapse d-md-none mobile-nav" id="mobileNav">
		<div class="apple-card p-3 mobile-nav-card">
			<nav class="mobile-nav-links">
				<a href="https://github.com/NhanAZ/glyph" target="_blank" rel="noopener noreferrer" class="d-flex align-items-center gap-2">
					<i class="fab fa-github"></i> GitHub
				</a>
				<a href="https://wiki.bedrock.dev/text/custom-emojis" target="_blank" rel="noopener noreferrer" class="d-flex align-items-center gap-2">
					<i class="fas fa-book"></i> Docs
				</a>
				<a href="https://discord.gg/j2X83ujT6c" target="_blank" rel="noopener noreferrer" class="d-flex align-items-center gap-2">
					<i class="fab fa-discord"></i> Discord
				</a>
			</nav>
		</div>
	</div>

		<!-- Mobile Alert -->
		<div id="mobileAlert" class="alert alert-warning fade show d-md-none rounded-alert mobile-alert" role="alert">
			<strong>Mobile tip:</strong> Best viewed on desktop - this will close in 5s.
		</div>

		<div class="row g-4 mb-4">
			<!-- Glyph Generator Card -->
			<div class="col-md-6">
				<div class="apple-card h-100 p-4">
					<h2 class="h5 fw-bold mb-4">Glyph Generator</h2>
					
					<div class="mb-4">
						<label class="form-label detail-text mb-2 d-flex justify-content-between">
							<span>HEX CODE</span>
							<span id="inputValidation" class="text-danger small d-none">Invalid hex</span>
						</label>
						<div class="input-wrapper">
							<input type="text" id="glyph-input" class="apple-input text-uppercase font-monospace fw-bold" placeholder="E0 used by default" maxlength="4">
						</div>
						<div id="defaultImageHint" class="text-primary fw-medium mt-2 d-none hint-link">
							<i class="fas fa-download me-1"></i> Load default <span id="hintHex">E0</span> image
						</div>
					</div>
					
					<div class="mb-3">
						<label class="form-label detail-text mb-2">CUSTOM GLYPH PNG</label>
						<div class="upload-zone d-flex align-items-center justify-content-between">
							<input type="file" id="glyphUpload" accept=".png" class="file-input opacity-0 position-absolute w-100 h-100">
							<div class="d-flex align-items-center gap-3 position-relative upload-zone-label">
								<i class="fas fa-image text-secondary opacity-75 fs-5"></i>
								<span id="uploadLabel" class="text-secondary upload-label-text">Upload glyph_XX.png</span>
							</div>
							<i class="fas fa-cloud-upload-alt text-primary fs-5 upload-zone-icon"></i>
						</div>
						<div class="d-flex gap-2 mt-3 flex-wrap">
							<button id="btnLoadTemplate" class="btn btn-sm btn-outline-secondary rounded-pill fw-medium pill-action"><i class="fas fa-border-all me-1"></i> Grid Template</button>
							<button id="btnLoadExample" class="btn btn-sm btn-outline-secondary rounded-pill fw-medium pill-action"><i class="fas fa-palette me-1"></i> E1 Example</button>
						</div>
					</div>

					<div id="glyphSuccessMsg" class="alert rounded-alert alert-success mt-3 d-none mb-0 py-2"></div>
					<div id="glyphErrorMsg" class="alert rounded-alert alert-danger mt-3 d-none mb-0 py-2"></div>
				</div>
			</div>

			<!-- Converter Card -->
			<div class="col-md-6">
				<div class="apple-card h-100 p-4">
					<h2 class="h5 fw-bold mb-4">Smart Converter</h2>
					
					<div class="mb-4">
						<label class="form-label detail-text mb-2 d-flex justify-content-between">
							<span>INPUT</span>
						</label>
						<input type="text" id="converterInput" class="apple-input" placeholder="Paste hex or emoji here...">
					</div>
					
					<div class="mb-3 position-relative">
						<label class="form-label detail-text mb-2">OUTPUT</label>
						<div class="output-wrapper position-relative">
							<input type="text" id="converterOutput" class="apple-input" readonly placeholder="Result appears here">
							<button id="copyButton" class="icon-button position-absolute copy-button" title="Copy to clipboard">
								<i class="far fa-copy"></i>
							</button>
						</div>
					</div>

					<div id="errorMsg" class="alert rounded-alert alert-danger mt-3 d-none mb-0 py-2"></div>
					<div id="successMsg" class="alert rounded-alert alert-success mt-3 d-none mb-0 py-2"></div>
				</div>
			</div>
		</div>

		<!-- Grid Card -->
		<div class="row">
			<div class="col-12">
				<div class="apple-card p-4">
					<div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-4">
						<div class="d-flex align-items-center gap-2 flex-wrap">
							<h2 class="h5 fw-bold mb-0">Generated Output</h2>
							<button id="gridModeToggle" class="btn btn-outline-secondary btn-sm rounded-pill fw-medium grid-toggle d-lg-none" type="button">
								<i class="fas fa-th-large me-1"></i><span class="grid-toggle-label">Adaptive grid</span>
							</button>
						</div>
						<div class="dropdown">
							<button class="btn btn-sm btn-light border rounded-pill px-3 py-2 fw-medium shadow-sm dropdown-toggle" type="button" id="exportDropdown" data-bs-toggle="dropdown" aria-expanded="false">
								<i class="fas fa-file-export me-1"></i> Smart Export
							</button>
							<ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-4 mt-2" aria-labelledby="exportDropdown">
								<li><button class="dropdown-item py-2 px-3 fw-medium" id="btnCopyAll"><i class="far fa-copy me-2 text-primary"></i> Copy All (Minecraft String)</button></li>
								<li><button class="dropdown-item py-2 px-3 fw-medium" id="btnCopyReference"><i class="fas fa-list-ul me-2 text-info"></i> Copy Reference (Text Map)</button></li>
								<li><hr class="dropdown-divider opacity-50"></li>
								<li><button class="dropdown-item py-2 px-3 fw-medium" id="btnDownloadJson"><i class="far fa-file-code me-2 text-success"></i> Download JSON (Pack)</button></li>
								<li><button class="dropdown-item py-2 px-3 fw-medium" id="btnDownloadFullJson"><i class="fas fa-database me-2 text-warning"></i> Download JSON (Metadata)</button></li>
							</ul>
						</div>
					</div>
					<div class="card-body p-0">
						<div id="glyph-output" class="glyph-grid"></div>
					</div>
				</div>
			</div>
		</div>

		<footer class="mt-5 mb-4 text-center">
			<div class="d-flex justify-content-center flex-wrap gap-4 footer-links">
				<a href="https://github.com/NhanAZ/glyph" target="_blank" rel="noopener noreferrer">
					<i class="fab fa-github me-1"></i> GitHub
				</a>
				<a href="https://wiki.bedrock.dev/text/custom-emojis" target="_blank" rel="noopener noreferrer">
					<i class="fas fa-book me-1"></i> Docs
				</a>
				<a href="https://discord.gg/j2X83ujT6c" target="_blank" rel="noopener noreferrer">
					<i class="fab fa-discord me-1"></i> Discord
				</a>
			</div>
		</footer>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="js/state.js"></script>
	<script src="js/defaults.js"></script>
	<script src="js/utils.js"></script>
	<script src="js/converter.js"></script>
	<script src="js/zoom.js"></script>
	<script src="js/glyph.js"></script>
	<script src="js/main.js"></script>
</body>

</html>
