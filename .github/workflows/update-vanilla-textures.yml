name: Update Vanilla Textures

on:
  schedule:
    - cron: "0 2 * * 1" # every Monday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-vanilla:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch vanilla textures
        run: node scripts/fetch-vanilla.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vanilla-textures scripts/fetch-vanilla.js
          git commit -m "chore: refresh vanilla textures"
          git push
